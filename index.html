<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoEmail</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:       #111214;
  --bg2:      #18191c;
  --bg3:      #1f2124;
  --bg4:      #26282d;
  --border:   #2e3035;
  --text:     #e8e8e8;
  --text2:    #999;
  --text3:    #555;
  --accent:   #7c6af7;
  --accent-h: #6a58e0;
  --danger:   #e05555;
  --success:  #3da874;
  --warn:     #d4960a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* ---- Shared buttons ---- */
.btn {
  font-size: 12px;
  padding: 6px 13px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  transition: background 0.1s;
  white-space: nowrap;
  line-height: 1.4;
}
.btn:hover:not(:disabled) { background: var(--bg4); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent-h); border-color: var(--accent-h); }
.btn-stop { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-stop:hover:not(:disabled) { background: #c03030; }
.btn-link { background: transparent; border-color: transparent; color: var(--text2); font-size: 12px; padding: 4px 6px; }
.btn-link:hover:not(:disabled) { color: var(--text); background: transparent; }

/* ================================================================
   LOGIN MODAL
   ================================================================ */
#modal-login {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 1050;
}
#login-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 40px;
  width: 360px;
  display: flex; flex-direction: column; gap: 16px;
}
#login-card h2 { font-size: 22px; font-weight: 700; color: var(--accent); }
#login-card p  { font-size: 13px; color: var(--text2); }
#login-card label {
  display: flex; flex-direction: column; gap: 5px;
  font-size: 12px; font-weight: 600; color: var(--text2);
}
#login-card input {
  font-size: 13px; padding: 8px 11px;
  border: 1px solid var(--border); border-radius: 5px;
  background: var(--bg3); color: var(--text); outline: none;
}
#login-card input:focus { border-color: var(--accent); }
#login-card .btn-primary { padding: 9px; font-size: 13px; font-weight: 600; }
#login-err { font-size: 12px; color: var(--danger); display: none; }

/* ================================================================
   HOME SCREEN
   ================================================================ */
#screen-home {
  display: none; flex-direction: column; flex: 1; overflow: hidden;
}
#home-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#home-logo { font-size: 18px; font-weight: 700; color: var(--accent); }
#home-user-info { display: flex; align-items: center; gap: 10px; }
#home-user-name { font-size: 13px; color: var(--text2); }
.btn-logout { font-size: 11px; }

#home-body {
  flex: 1; overflow-y: auto;
  padding: 36px 40px;
}
#home-body h2 { font-size: 18px; font-weight: 600; margin-bottom: 24px; }

#project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.proj-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  display: flex; flex-direction: column; gap: 10px;
  transition: border-color 0.15s;
}
.proj-card:hover { border-color: var(--accent); }
.proj-card-name  { font-size: 15px; font-weight: 600; }
.proj-card-meta  { font-size: 12px; color: var(--text2); display: flex; flex-direction: column; gap: 3px; }
.proj-card-actions { display: flex; gap: 8px; margin-top: 4px; }
.proj-card-actions .btn { flex: 1; text-align: center; }

.new-proj-card {
  background: transparent;
  border: 2px dashed var(--border);
  border-radius: 10px;
  padding: 20px;
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer;
  transition: border-color 0.15s;
  align-items: flex-start;
}
.new-proj-card:hover { border-color: var(--accent); }
.new-proj-card .plus { font-size: 24px; color: var(--text3); }
.new-proj-card .label { font-size: 13px; color: var(--text2); }

#new-proj-form {
  display: flex; gap: 8px; flex-wrap: wrap;
}
#new-proj-input {
  font-size: 13px; padding: 7px 10px;
  border: 1px solid var(--border); border-radius: 5px;
  background: var(--bg3); color: var(--text); outline: none;
  flex: 1; min-width: 140px;
}
#new-proj-input:focus { border-color: var(--accent); }

/* ================================================================
   APP SCREEN
   ================================================================ */
#screen-app { display: none; flex-direction: column; flex: 1; overflow: hidden; }

/* ---- Top bar ---- */
#topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
  background: var(--bg2);
}

#back-btn { font-size: 12px; }
#app-title { font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; }
#proj-name-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
#topbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

.topbar-group { display: flex; align-items: center; gap: 7px; }
.topbar-group label { font-size: 11px; color: var(--text2); white-space: nowrap; }
.topbar-input {
  font-size: 12px; padding: 5px 8px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg3); color: var(--text); outline: none; width: 200px;
}
.topbar-input:focus { border-color: var(--accent); }
select.topbar-input { cursor: pointer; }
select.topbar-input option { background: var(--bg3); color: var(--text); }

#upload-info { font-size: 11px; color: var(--text2); max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#upload-info.err { color: var(--danger); }
#progress-label { font-size: 12px; color: var(--text2); }
#api-warning    { font-size: 12px; color: var(--danger); display: none; }

#gmail-status { font-size: 12px; color: var(--success); display: none; }

/* ---- Tab bar ---- */
#tab-bar {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: var(--bg2);
}
.tab-btn {
  font-size: 13px; padding: 9px 20px;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; cursor: pointer; color: var(--text2);
  transition: color 0.1s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.tab-btn:hover  { color: var(--text); }

/* ---- Main area ---- */
#main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }

/* ---- Sidebar ---- */
#sidebar {
  width: 250px; flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto; padding: 6px 0;
}

.company-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 9px 14px;
  background: transparent; border: none;
  border-left: 3px solid transparent;
  cursor: pointer; text-align: left; transition: background 0.1s;
}
.company-btn:hover  { background: var(--bg3); }
.company-btn.active { background: var(--bg4); border-left-color: var(--accent); }

.cbtn-text { flex: 1; min-width: 0; }
.cbtn-name {
  font-size: 13px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cbtn-sector {
  font-size: 11px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--text3); }
.dot.loading { background: var(--warn); }
.dot.done    { background: var(--success); }
.dot.error   { background: var(--danger); }

/* ---- Right panel ---- */
#panel { flex: 1; padding: 24px 28px; overflow-y: auto; }

.p-to { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
.p-to strong { color: var(--text); }

.p-subject-label {
  font-size: 11px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
}
.p-subject-box {
  background: var(--bg3); border-radius: 6px;
  padding: 8px 12px; font-size: 13px; color: var(--text); margin-bottom: 16px;
  border: 1px solid var(--border);
}
.p-subject-editable { cursor: text; }
.p-subject-editable:focus { border-color: var(--accent); outline: none; }

.fmt-toolbar { display: flex; gap: 4px; margin-bottom: 6px; }
.fmt-btn {
  width: 28px; height: 26px;
  border: 1px solid var(--border); background: var(--bg3);
  border-radius: 3px; cursor: pointer; font-size: 13px; line-height: 1;
  padding: 0; color: var(--text);
}
.fmt-btn:hover { background: var(--bg4); }
.fmt-sep { width: 1px; background: var(--border); margin: 0 2px; }

.p-body-editor {
  white-space: pre-wrap; line-height: 1.8; font-size: 13px; color: var(--text);
  margin-bottom: 16px; min-height: 180px;
  border: 1px solid var(--border); border-radius: 4px;
  padding: 10px 12px; outline: none; background: var(--bg3);
}
.p-body-editor:focus { border-color: var(--accent); }

.copy-row  { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.send-row  { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
#flash     { font-size: 12px; color: var(--success); height: 18px; }
.loading-msg { font-size: 14px; color: var(--text2); padding: 32px 0; }
.err-title { font-size: 13px; color: var(--danger); margin-bottom: 8px; }
.err-box {
  background: #2a1515; border: 1px solid #5a2222; border-radius: 4px;
  padding: 10px 12px; font-size: 12px; color: #e08080;
  font-family: monospace; margin-bottom: 12px;
  white-space: pre-wrap; word-break: break-all;
}
.muted { color: var(--text2); font-size: 13px; margin-bottom: 14px; }

/* ---- Views ---- */
#view-emails { display: flex; flex: 1; overflow: hidden; }

#view-settings {
  display: none; flex: 1; overflow-y: auto; flex-direction: column;
}
.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.settings-header h3 { font-size: 15px; font-weight: 600; }
.settings-save-row { display: flex; align-items: center; gap: 10px; }
#settings-dirty { font-size: 12px; color: var(--warn); display: none; }
#settings-saved { font-size: 12px; color: var(--success); display: none; }

.settings-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 28px; max-width: 100%; }
.tmpl-section {}
.tmpl-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.tmpl-hint  { font-size: 11px; color: var(--text2); margin-bottom: 7px; }
.tmpl-textarea {
  width: 100%; font-size: 13px; font-family: system-ui, sans-serif;
  line-height: 1.7; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 4px;
  resize: vertical; outline: none;
  color: var(--text); background: var(--bg3);
}
.tmpl-textarea:focus { border-color: var(--accent); }
.tmpl-divider { border: none; border-top: 1px solid var(--border); }

/* Settings rich editor */
.tmpl-editor-wrap { position: relative; }
.tmpl-fmt-toolbar {
  display: flex; gap: 3px; margin-bottom: 5px;
  padding: 4px 6px;
  background: var(--bg4); border: 1px solid var(--border);
  border-radius: 4px 4px 0 0; border-bottom: none;
  flex-wrap: wrap;
}
.tmpl-fmt-btn {
  width: 26px; height: 24px; font-size: 12px; line-height: 1;
  border: 1px solid var(--border); background: var(--bg3);
  border-radius: 3px; cursor: pointer; color: var(--text); padding: 0;
}
.tmpl-fmt-btn:hover { background: var(--bg2); }
.tmpl-fmt-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tmpl-fmt-sep { width: 1px; background: var(--border); margin: 0 2px; align-self: stretch; }
.tmpl-editor {
  width: 100%; min-height: 80px; font-size: 13px; font-family: system-ui, sans-serif;
  line-height: 1.7; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 0 0 4px 4px;
  outline: none; color: var(--text); background: var(--bg3);
  overflow-y: auto; word-break: break-word;
  white-space: pre-wrap;
}
.tmpl-editor:focus { border-color: var(--accent); }

/* Attachments */
.attach-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.attach-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg4); border: 1px solid var(--border);
  border-radius: 4px; padding: 6px 10px; font-size: 12px;
}
.attach-item-name { flex: 1; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.attach-item-size { color: var(--text3); font-size: 11px; white-space: nowrap; }
.attach-add-row { display: flex; gap: 8px; align-items: center; }

/* ---- Tutorial modal ---- */
#modal-tutorial {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 1100;
}
#tutorial-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 560px; max-height: 88vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
#tutorial-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#tutorial-header h3 { font-size: 15px; font-weight: 600; }
#tutorial-close {
  background: transparent; border: none; color: var(--text2);
  font-size: 18px; cursor: pointer; line-height: 1; padding: 0 2px;
}
#tutorial-close:hover { color: var(--text); }
#tutorial-tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tut-tab {
  font-size: 12px; padding: 8px 18px;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; cursor: pointer; color: var(--text2);
}
.tut-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
#tutorial-body {
  overflow-y: auto; padding: 20px 24px; flex: 1;
}
.tut-step {
  display: flex; gap: 14px; margin-bottom: 20px;
}
.tut-step:last-child { margin-bottom: 0; }
.tut-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.tut-text { font-size: 13px; line-height: 1.6; color: var(--text); }
.tut-text strong { color: var(--accent); font-weight: 600; }
.tut-text a { color: var(--accent); }
.tut-note {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 14px;
  font-size: 12px; color: var(--text2); margin-top: 16px; line-height: 1.6;
}
.tut-note strong { color: var(--text); }

/* ---- New Project Modal ---- */
#modal-new-project {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1001;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
#new-proj-modal-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; width: 420px; max-width: 96vw;
  display: flex; flex-direction: column; overflow: hidden;
}
#new-proj-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px 14px; border-bottom: 1px solid var(--border);
}
#new-proj-modal-header h3 { font-size: 15px; font-weight: 600; }
#new-proj-modal-body { padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
#new-proj-modal-footer { padding: 14px 22px 18px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
.np-label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; font-weight: 600; color: var(--text2); }
.np-opt   { font-weight: 400; color: var(--text3); }
.np-input { font-size: 13px; padding: 8px 11px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg3); color: var(--text); outline: none; }
.np-input:focus { border-color: var(--accent); }
.np-file-row { display: flex; align-items: center; gap: 10px; }

/* ---- Theme picker ---- */
#theme-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: none; justify-content: center;
  padding: 6px 0; background: var(--bg2);
  border-top: 1px solid var(--border); z-index: 100;
}
#theme-bar-link {
  font-size: 11px; color: var(--text3); cursor: pointer; user-select: none;
  padding: 3px 8px; border-radius: 4px;
}
#theme-bar-link:hover { color: var(--text2); background: var(--bg3); }
#theme-picker-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 200; backdrop-filter: blur(4px);
}
#theme-picker-panel {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px 12px 0 0; width: 100%; max-width: 760px;
  padding: 20px 24px 28px; max-height: 80vh; overflow-y: auto;
}
#theme-picker-panel h4 { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text2); }
.theme-swatches { display: flex; flex-wrap: wrap; gap: 10px; }
.theme-swatch {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer; border-radius: 6px; padding: 5px;
  transition: background 0.1s;
}
.theme-swatch:hover { background: var(--bg3); }
.theme-swatch.active { outline: 2px solid var(--accent); border-radius: 8px; }
.swatch-rect {
  width: 64px; height: 40px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center; gap: 3px;
}
.swatch-dot { width: 10px; height: 10px; border-radius: 50%; }
.swatch-name { font-size: 10px; color: var(--text2); white-space: nowrap; }
.theme-add-btn { margin-top: 14px; }

/* ---- Log view ---- */
#view-log {
  display: none; flex: 1; overflow-y: auto; padding: 24px 28px;
}
.log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.log-table th {
  text-align: left; padding: 8px 12px;
  border-bottom: 1px solid var(--border); color: var(--text2);
  font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
}
.log-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
.log-table tr:last-child td { border-bottom: none; }
.log-empty { font-size: 13px; color: var(--text2); padding: 24px 0; }
</style>
</head>
<body>

<!-- ================================================================
     LOGIN MODAL
     ================================================================ -->
<div id="modal-login" style="display:none;">
  <div id="login-card">
    <h2>AutoEmail</h2>
    <p>Set up your profile to get started.</p>
    <label>Your name
      <input type="text" id="login-name" placeholder="Your name" autocomplete="name">
    </label>
    <label>Your email
      <input type="email" id="login-email" placeholder="you@gmail.com" autocomplete="email">
    </label>
    <div id="login-err">Please fill in both fields.</div>
    <button class="btn btn-primary" onclick="saveProfile()">Continue</button>
  </div>
</div>

<!-- ================================================================
     TUTORIAL MODAL
     ================================================================ -->
<div id="modal-tutorial" style="display:none;">
  <div id="tutorial-card">
    <div id="tutorial-header">
      <h3>Setup Guide</h3>
      <button id="tutorial-close" onclick="closeTutorial()">&#10005;</button>
    </div>
    <div id="tutorial-tabs">
      <button class="tut-tab active" id="tut-tab-gemini" onclick="switchTutTab('gemini')">Gemini API Key</button>
      <button class="tut-tab"        id="tut-tab-gmail"  onclick="switchTutTab('gmail')">Gmail Client ID</button>
    </div>
    <div id="tutorial-body">
      <!-- populated by switchTutTab() -->
    </div>
  </div>
</div>

<!-- ================================================================
     NEW PROJECT MODAL
     ================================================================ -->
<div id="modal-new-project" style="display:none;">
  <div id="new-proj-modal-card">
    <div id="new-proj-modal-header">
      <h3>New Project</h3>
      <button class="btn btn-link" onclick="openTutorial()" title="Setup guide" style="font-size:14px;">&#63;</button>
    </div>
    <div id="new-proj-modal-body">
      <label class="np-label">Project name
        <input type="text" id="np-name" class="np-input" placeholder="My Outreach Campaign">
      </label>

// ============================================================
//  IndexedDB abstraction
// ============================================================
const DB_NAME = 'autoemail', DB_VERSION = 1;
let _db = null;

const DB = {
  open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        ['users','projects','sheets','emailState','templates','followupTemplates',
         'attachments','logs','settings','customThemes'].forEach(s => {
          if (!db.objectStoreNames.contains(s)) db.createObjectStore(s);
        });
      };
      req.onsuccess = e => { _db = e.target.result; resolve(); };
      req.onerror   = e => reject(e.target.error);
    });
  },
  _tx(store, mode) { return _db.transaction(store, mode).objectStore(store); },
  get(store, key) {
    return new Promise((res, rej) => {
      const r = this._tx(store, 'readonly').get(key);
      r.onsuccess = () => res(r.result ?? null);
      r.onerror   = e => rej(e.target.error);
    });
  },
  put(store, key, value) {
    return new Promise((res, rej) => {
      const r = this._tx(store, 'readwrite').put(value, key);
      r.onsuccess = () => res();
      r.onerror   = e => rej(e.target.error);
    });
  },
  delete(store, key) {
    return new Promise((res, rej) => {
      const r = this._tx(store, 'readwrite').delete(key);
      r.onsuccess = () => res();
      r.onerror   = e => rej(e.target.error);
    });
  },
  getAllByPrefix(store, prefix) {
    return new Promise((res, rej) => {
      const results = [];
      const r = this._tx(store, 'readonly').openCursor();
      r.onsuccess = e => {
        const c = e.target.result;
        if (c) { if (String(c.key).startsWith(prefix)) results.push({ key: c.key, value: c.value }); c.continue(); }
        else res(results);
      };
      r.onerror = e => rej(e.target.error);
    });
  }
};

function idbStoreForKey(key) {
  if (key === 'ae_user')     return 'users';
  if (key === 'ae_projects') return 'projects';
  if (key.endsWith('_state'))       return 'emailState';
  if (key.endsWith('_companies'))   return 'sheets';
  if (key.endsWith('_template'))    return 'templates';
  if (key.endsWith('_attachments')) return 'attachments';
  if (key.endsWith('_log'))         return 'logs';
  return 'settings';
}

async function migrateFromLocalStorage() {
  const done = await DB.get('settings', 'ae_migration_done');
  if (done) return;
  // Old key renames
  if (localStorage.getItem('email_api_key') && !localStorage.getItem('ae_apikey')) {
    localStorage.setItem('ae_apikey', localStorage.getItem('email_api_key'));
    localStorage.removeItem('email_api_key');
  }
  if (localStorage.getItem('gmail_client_id') && !localStorage.getItem('ae_gmailcid')) {
    localStorage.setItem('ae_gmailcid', localStorage.getItem('gmail_client_id'));
    localStorage.removeItem('gmail_client_id');
  }
  for (const k of Object.keys(localStorage)) {
    if (!k.startsWith('ae_')) continue;
    const store = idbStoreForKey(k);
    const val = localStorage.getItem(k);
    if (val !== null) await DB.put(store, k, val);
  }
  await DB.put('settings', 'ae_migration_done', true);
}

}

async function renderHome() {

  for (const p of projects) {
    const stateRaw = await DB.get('emailState', `ae_proj_${p.id}_state`);
    const compsRaw = await DB.get('sheets',     `ae_proj_${p.id}_companies`);
    const logRaw   = await DB.get('logs',       `ae_proj_${p.id}_log`);
    const state    = stateRaw ? JSON.parse(stateRaw) : {};
    const comps    = compsRaw ? JSON.parse(compsRaw) : [];
    const log      = logRaw   ? JSON.parse(logRaw)   : [];
    const total    = comps.length;
    const done     = Object.values(state).filter(s => s.status === 'done').length;
    const sent     = Object.values(state).filter(s => s.sent).length;
    const lastSent = log.length ? new Date(log[0].sentAt).toLocaleDateString('en-GB') : null;

    // Theme colors for card
    const themeId  = await DB.get('settings', `ae_proj_${p.id}_theme`) || 'midnight';
    const tc       = (BUILT_IN_THEMES[themeId] || BUILT_IN_THEMES.midnight).colors;

    card.className = 'proj-card';
    card.style.cssText = `background:${tc['--bg2']};border-color:${tc['--border']};`;
    card.querySelector = undefined; // dummy — will be set below

function npHandleExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('np-excel-status');
  status.textContent = 'Parsing...';
  parseExcel(file).then(rows => {
    window._npExcelParsed = { name: file.name, rows };
    status.textContent = `${rows.length} companies loaded`;
    status.style.color = 'var(--success)';
  }).catch(err => {
    status.textContent = 'Error: ' + err.message;
    status.style.color = 'var(--danger)';
  });
}

async function createProjectFromModal() {
  const rawName = document.getElementById('np-name').value.trim();
  const name    = rawName || 'Untitled Project';
  const apiKey  = document.getElementById('np-apikey').value.trim();
  const gmailCid= document.getElementById('np-gmailcid').value.trim();

  const id       = Date.now().toString(36);
  const projects = await getProjects();
  projects.push({ id, name, createdAt: new Date().toISOString() });
  await saveProjects(projects);

  const comps = window._npExcelParsed ? window._npExcelParsed.rows : [];
  const state = {};
  comps.forEach(c => { state[c.id] = { status: 'pending', subject: '', body: '', error: '', sent: false }; });

  await DB.put('sheets',    `ae_proj_${id}_companies`,   JSON.stringify(comps));
  await DB.put('emailState',`ae_proj_${id}_state`,       JSON.stringify(state));
  await DB.put('templates', `ae_proj_${id}_template`,    JSON.stringify(DEFAULT_TEMPLATE));
  await DB.put('attachments',`ae_proj_${id}_attachments`,JSON.stringify([]));
  await DB.put('settings',  `ae_proj_${id}_excel_desc`,  DEFAULT_EXCEL_DESC);
  // Always store per-project key (empty string = explicitly not set, no global fallback)
  await DB.put('settings', `ae_proj_${id}_apikey`,   apiKey);
  await DB.put('settings', `ae_proj_${id}_gmailcid`, gmailCid);

  closeNewProjectModal();
  renderHome();
}

  const s = await DB.get('projects', 'ae_projects');

async function saveProjects(arr) {

async function deleteProject(id) {
  if (!confirm('Delete this project and all its data? This cannot be undone.')) return;
  const projects = (await getProjects()).filter(p => p.id !== id);
  await saveProjects(projects);
  const stores = ['emailState','sheets','templates','attachments','logs','settings'];
  for (const store of stores) {
    const entries = await DB.getAllByPrefix(store, `ae_proj_${id}_`);
    for (const { key } of entries) await DB.delete(store, key);
  }
  renderHome();
}

    // Migrate old single companies array
    const sc = await DB.get('sheets', ns('companies'));
    const oldComps = sc ? JSON.parse(sc) : [];
    sheets = oldComps.length
      ? [{ id: 'sheet_default', name: 'Imported', companies: oldComps }]
      : [];
  }
  activeSheetIds = sheets.map(s => s.id);
  recomputeActiveCompanies();

  const ss = await DB.get('emailState', ns('state'));
  emailState = ss ? JSON.parse(ss) : {};
  companies.forEach(c => {
    if (!emailState[c.id])
      emailState[c.id] = { status: 'pending', subject: '', body: '', error: '', sent: false };
  });

  // Load follow-up templates
  const fuRaw = await DB.get('followupTemplates', ns('followup_templates'));
  followupTemplates = fuRaw ? JSON.parse(fuRaw) : [];

  const stRaw = await DB.get('templates', ns('template'));
  template = stRaw ? JSON.parse(stRaw) : { ...DEFAULT_TEMPLATE };
  // Migrate old multi-field format → single body field
  if (!template.body && (template.para1 || template.para2)) {
    const p1  = template.para1   || '';
    const p2  = template.para2   || '';
    const cl  = template.closing || '';
    const sig = template.signature || '';
    template.body = `Hello {{FIRST_NAME}},\n\n${p1}\n\n${p2}\n\n[TAILORED PARAGRAPH]\n\n${cl}\n\n${sig}`;
    delete template.para1; delete template.para2; delete template.closing; delete template.signature;
    saveTemplate();
  }
  if (!template.body) template = { ...DEFAULT_TEMPLATE };
  draftTemplate = { ...template };

  const ed = await DB.get('settings', ns('excel_desc'));
  excelDesc = ed || DEFAULT_EXCEL_DESC;
  draftExcelDesc = excelDesc;

  const att = await DB.get('attachments', ns('attachments'));
  attachments = att ? JSON.parse(att) : [];

  const scRaw = await DB.get('settings', ns('sheet_colmaps'));
  sheetColmaps = scRaw ? JSON.parse(scRaw) : {};

  // Load per-project API key — only fall back to global for projects created before per-project keys existed
  // (projects created via new modal always have explicit per-project key, even if empty string)
  const projApiKeyRaw   = await DB.get('settings', ns('apikey'));
  const projGmailCidRaw = await DB.get('settings', ns('gmailcid'));
  // If key was explicitly set (even empty string stored as ''), use it; if never set (null), fall back to global for legacy projects
  const projApiKey   = projApiKeyRaw   !== null ? projApiKeyRaw   : (await DB.get('settings', 'ae_apikey')  || '');
  const projGmailCid = projGmailCidRaw !== null ? projGmailCidRaw : (await DB.get('settings', 'ae_gmailcid') || '');

  // Model selector
  const savedModel = await DB.get('settings', 'ae_gemini_model') || 'gemini-2.5-flash';
  const sel = document.getElementById('geminiModel');
  sel.innerHTML = GEMINI_MODELS.map(m =>
    `<option value="${m.id}"${m.id === savedModel ? ' selected' : ''}>${m.label}</option>`
  ).join('');

  document.getElementById('apiKey').value = projApiKey;
  document.getElementById('apiKey').oninput = e => {
    DB.put('settings', ns('apikey'), e.target.value.trim()).catch(console.error);
    hideWarning();
  };

  document.getElementById('gmailClientId').value = projGmailCid;
  document.getElementById('gmailClientId').oninput = e => {
    DB.put('settings', ns('gmailcid'), e.target.value.trim()).catch(console.error);
    resetGmailState();
  };

  if (projGmailCid) waitForGIS(() => initGmailClient(projGmailCid));

  document.getElementById('uploadBtn').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('fileInput').onchange = handleUpload;
  document.getElementById('genAllBtn').onclick  = generateAll;
  document.getElementById('stopBtn').onclick    = () => {
    stopRequested = true;
    document.getElementById('stopBtn').style.display = 'none';
  };

  // Apply project theme
  const themeId = await DB.get('settings', ns('theme')) || 'midnight';
  applyTheme(themeId);
  activeTheme = themeId;
  updateThemeLabel();

  selectedId = companies.length ? companies[0].id : null;
  sidebarSearch = '';
  switchTab('emails');
  renderSheetSelector();
  renderSidebar();
  if (selectedId) selectCompany(selectedId);
  refreshProgress();
  initContextMenu();
  initKeyboardShortcuts();
}

// ============================================================
//  Persistence (fire-and-forget writes)
// ============================================================
function saveState()       { DB.put('emailState', ns('state'),       JSON.stringify(emailState)).catch(console.error); }
function saveCompanies()   { DB.put('sheets',     ns('companies'),   JSON.stringify(companies)).catch(console.error); }
function saveTemplate()    { DB.put('templates',  ns('template'),    JSON.stringify(template)).catch(console.error); }
function saveAttachments() { DB.put('attachments',ns('attachments'), JSON.stringify(attachments)).catch(console.error); }
function saveExcelDesc()   { DB.put('settings',   ns('excel_desc'),  excelDesc).catch(console.error); }
function saveSheets()      { DB.put('sheets', ns('sheets'), JSON.stringify(sheets)).catch(console.error); }
function saveSheetColmaps(){ DB.put('settings', ns('sheet_colmaps'), JSON.stringify(sheetColmaps)).catch(console.error); }
function saveFollowupTemplates() { DB.put('followupTemplates', ns('followup_templates'), JSON.stringify(followupTemplates)).catch(console.error); }

function recomputeActiveCompanies() {
  companies = sheets
    .filter(s => activeSheetIds.includes(s.id))
    .flatMap(s => s.companies);
}

function renderSheetSelector() {
  // Ensure the sidebar is wrapped (only inject wrapper once; sidebar may already be in wrapper)
  let el = document.getElementById('sheet-selector');
  if (!el) {
    const emailsView = document.getElementById('view-emails');
    const sidebar    = document.getElementById('sidebar');
    // Check if sidebar is already inside a wrapper
    if (sidebar.parentElement !== emailsView) {
      // Already wrapped from a previous call — just re-query
      el = sidebar.parentElement.querySelector('#sheet-selector');
    }
    if (!el) {
      const wrap = document.createElement('div');
      wrap.id = 'sidebar-wrap';
      wrap.style.cssText = 'display:flex;flex-direction:column;width:250px;flex-shrink:0;overflow:hidden;';
      el = document.createElement('div');
      el.id = 'sheet-selector';
      el.style.cssText = 'background:var(--bg2);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 8px;flex-shrink:0;';
      emailsView.insertBefore(wrap, sidebar);
      wrap.appendChild(el);
      wrap.appendChild(sidebar);
    }
  }
  if (!sheets.length) { el.innerHTML = ''; return; }
  el.innerHTML = sheets.map(s =>
    `<label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);padding:2px 0;cursor:pointer;">
       <input type="checkbox" ${activeSheetIds.includes(s.id)?'checked':''} onchange="toggleSheet('${s.id}',this.checked)">
       <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(s.name)}">${esc(s.name)}</span>
     </label>`
  ).join('');
}

function toggleSheet(sheetId, checked) {
  if (checked) { if (!activeSheetIds.includes(sheetId)) activeSheetIds.push(sheetId); }
  else { activeSheetIds = activeSheetIds.filter(id => id !== sheetId); }
  recomputeActiveCompanies();
  selectedId = companies[0]?.id || null;
  renderSidebar(); if (selectedId) renderPanel(); refreshProgress();
}

// ============================================================
//  Sidebar
// ============================================================
function renderSidebar() { renderSidebarWithSearch(); }

function updateSidebarDot(id) {
  const btn = document.querySelector(`.company-btn[data-id="${id}"],.company-btn[data-id="${String(id)}"]`);
  if (!btn) return;
  const st = emailState[id] || { status: 'pending' };
  const dot = btn.querySelector('.dot');
  if (dot) dot.className = `dot ${dotClass(st.status)}`;
}

function dotClass(status) {
  return status === 'loading' ? 'loading' :
         status === 'done'    ? 'done'    :
         status === 'error'   ? 'error'   : '';
}

function selectCompany(id) {
  selectedId = id;
  document.querySelectorAll('.company-btn').forEach(b =>
    b.classList.toggle('active', String(b.dataset.id) === String(id)));
  renderPanel();
}

function renderPanel() {
  const panel = document.getElementById('panel');
  if (!companies.length) {
    panel.innerHTML = `<div style="padding:48px 28px;text-align:center;">
      <div style="font-size:32px;margin-bottom:12px;">📂</div>

      <p style="font-size:13px;color:var(--text2);">Upload an Excel sheet using the <strong>+ Add Sheet</strong> button above to get started.</p>
    </div>`;
    return;
  }
  if (!selectedId) { panel.innerHTML = '<p class="muted" style="padding:24px;">Select a company from the sidebar.</p>'; return; }
  const c  = companies.find(x => String(x.id) === String(selectedId));
  const st = emailState[String(selectedId)] || { status: 'pending' };
  if (!c) return;
  const toLine = `<div class="p-to">To: <strong>${esc(c.poc)}</strong> &lt;${esc(c.email)}&gt;</div>`;

  const cid = String(c.id);

  switch (st.status) {
    case 'pending':
      panel.innerHTML =
        toLine +
        `<p class="muted">No email generated yet.</p>
         <div style="display:flex;gap:10px;flex-wrap:wrap;">
           <button class="btn btn-primary" onclick="triggerGenerate('${cid}')">Generate with AI</button>
           <button class="btn" onclick="startManualWrite('${cid}')">Write manually</button>
         </div>`;
      break;
    case 'manual':
      panel.innerHTML =
        toLine +
        `<div class="p-subject-label">Subject</div>
         <div class="p-subject-box p-subject-editable" contenteditable="true"
              id="edit-subject-${cid}" oninput="saveEdits('${cid}')"></div>
         <div class="fmt-toolbar">
           <button class="fmt-btn" onmousedown="event.preventDefault();applyFmt('bold')" title="Bold"><b>B</b></button>
           <button class="fmt-btn" onmousedown="event.preventDefault();applyFmt('italic')" title="Italic"><i>I</i></button>
           <button class="fmt-btn" onmousedown="event.preventDefault();applyFmt('underline')" title="Underline"><u>U</u></button>
           <div class="fmt-sep"></div>
           <button class="fmt-btn" onmousedown="event.preventDefault();applyFmt('removeFormat')" title="Clear formatting" style="font-size:11px;">Tx</button>
         </div>
         <div class="p-body-editor" contenteditable="true"
              id="edit-body-${cid}" oninput="saveEdits('${cid}')">${toEditorHtml(template.body||'').replace(/\[TAILORED PARAGRAPH\]/g,'<span style="background:rgba(124,106,247,0.2);border-radius:3px;padding:0 3px;">[write your paragraph here]</span>')}</div>
         <div class="send-row">
           <button class="btn btn-primary" onclick="manualDone('${cid}')">Done</button>
           <button class="btn" onclick="setState('${cid}',{...emailState['${cid}'],status:'pending'})">Cancel</button>
         </div>
         <div id="flash"></div>`;
      break;
    case 'loading':
      panel.innerHTML = `<div class="loading-msg">Researching ${esc(c.name)} and writing email...</div>`;
      break;
    case 'error':
      panel.innerHTML =
        toLine +
        `<div class="err-title">Generation failed.</div>
         <div class="err-box">${esc(st.error)}</div>
         <button class="btn btn-primary" onclick="triggerGenerate('${cid}')">Retry</button>`;
      break;
    case 'done':
      if (st.locked && st.sent) {
        // Locked sent email
        const sentDate = st.sentAt ? new Date(st.sentAt).toLocaleString('en-GB') : 'unknown time';
        panel.innerHTML =
          toLine +
          `<div class="p-subject-label">Subject</div>
           <div class="p-subject-box" style="background:var(--bg2);color:var(--text2);">${esc(st.subject)}</div>
           <div class="p-body-editor" style="background:var(--bg2);color:var(--text2);cursor:default;">${bodyToHtml(st.body)}</div>
           <div style="font-size:11px;color:var(--text3);margin-bottom:12px;">&#10003; Sent on ${sentDate}</div>
           ${renderFollowupSection(cid)}
           <div id="flash"></div>`;
      } else {
        panel.innerHTML =
          toLine +
          `<div class="p-subject-label">Subject</div>
           <div class="p-subject-box p-subject-editable"
                contenteditable="true"
                id="edit-subject-${cid}"
                oninput="saveEdits('${cid}')">${esc(st.subject)}</div>

           <div class="fmt-toolbar">
             <button class="fmt-btn" onmousedown="event.preventDefault();applyFmt('bold')" title="Bold"><b>B</b></button>
             <button class="fmt-btn" onmousedown="event.preventDefault();applyFmt('italic')" title="Italic"><i>I</i></button>
             <button class="fmt-btn" onmousedown="event.preventDefault();applyFmt('underline')" title="Underline"><u>U</u></button>
             <div class="fmt-sep"></div>
             <button class="fmt-btn" onmousedown="event.preventDefault();applyFmt('removeFormat')" title="Clear formatting" style="font-size:11px;">Tx</button>
           </div>
           <div class="p-body-editor"
                contenteditable="true"
                id="edit-body-${cid}"
                oninput="saveEdits('${cid}')">${bodyToHtml(st.body)}</div>

           <div class="copy-row">
             <button class="btn" onclick="copyBody()">Copy body</button>
             <button class="btn" onclick="copySubject()">Copy subject</button>
             <button class="btn" onclick="copyAll()">Copy all</button>
             <button class="btn" onclick="triggerRegenerate('${cid}')">Regenerate</button>
           </div>
           <div class="send-row">
             <button class="btn btn-primary" onclick="triggerGmail('${cid}', 'send')">Send now</button>

// ============================================================
//  Tab switching (within app)
// ============================================================
function switchTab(name) {
  // Warn if leaving settings with unsaved changes
  if (name !== 'settings') {
    const dirtyEl = document.getElementById('settings-dirty');
    if (dirtyEl && dirtyEl.style.display !== 'none') {
      if (!confirm('You have unsaved changes in Settings. Leave without saving?')) return;
      markClean();
    }
  }
  const tabs = { emails: 'view-emails', settings: 'view-settings', log: 'view-log' };
  Object.entries(tabs).forEach(([t, viewId]) => {
    document.getElementById(viewId).style.display = t === name ? (t === 'emails' ? 'flex' : 'flex') : 'none';
    const btn = document.getElementById('tab-' + t);
    if (btn) btn.classList.toggle('active', t === name);
  });
  if (name === 'settings') renderSettings();
  if (name === 'log')      renderLog();
}

       <div class="tmpl-label">Attachments</div>

       <div class="attach-list" id="attach-list">${attachListHtml}</div>
       <div class="attach-add-row">
         <button class="btn" onclick="document.getElementById('attachInput').click()">+ Add file</button>
         <input type="file" id="attachInput" multiple style="display:none" onchange="handleAttachUpload(event)">
       </div>
     </div>

     <hr class="tmpl-divider">

     <div class="tmpl-section">

       <div class="tmpl-hint">Describe the structure of your Excel file so the app knows how to read it. This is used as context when parsing uploads.</div>
       <textarea class="tmpl-textarea" id="excel-desc-input" rows="6"
         oninput="draftExcelDesc=this.value;markDirty()">${esc(draftExcelDesc)}</textarea>
     </div>

     <hr class="tmpl-divider">

     ${sheets.length ? `<div class="tmpl-section">

function renderFollowupTemplatesList() {

    return;
  }
  container.innerHTML = followupTemplates.map((t, i) => `
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <input class="np-input" style="flex:1;font-size:13px;" value="${esc(t.name)}"
          oninput="followupTemplates[${i}].name=this.value;saveFollowupTemplates()">
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);white-space:nowrap;cursor:pointer;">
          <input type="checkbox" ${t.useGemini?'checked':''} onchange="followupTemplates[${i}].useGemini=this.checked;saveFollowupTemplates()">
          Use Gemini AI
        </label>
        <button class="btn" style="color:var(--danger);border-color:var(--danger);padding:3px 8px;font-size:11px;" onclick="deleteFollowupTemplate(${i})">Remove</button>
      </div>
      <div class="tmpl-hint">Body (use {{COMPANY}}, {{FIRST_NAME}})</div>
      <textarea class="tmpl-textarea" rows="4" oninput="followupTemplates[${i}].body=this.value;saveFollowupTemplates()">${esc(t.body)}</textarea>
      <div class="tmpl-hint" style="margin-top:8px;">Generation rules (Gemini only)</div>

    </div>`).join('');

function addFollowupTemplate() {
  followupTemplates.push({ name: 'Follow-up ' + (followupTemplates.length + 1), body: 'Hi {{FIRST_NAME}},\n\nI wanted to follow up on my previous email regarding an internship opportunity at {{COMPANY}}.\n\nI remain very interested and would love to connect.', rules: 'Keep it brief. Reference the original email.', useGemini: false });
  saveFollowupTemplates();
  renderFollowupTemplatesList();
}

function deleteFollowupTemplate(i) {
  followupTemplates.splice(i, 1);
  saveFollowupTemplates();
  renderFollowupTemplatesList();
}

function toEditorHtml(val) {
  if (!val) return '';
  if (/<[a-z]/i.test(val)) return val;       // already HTML
  return esc(val).replace(/\n/g, '<br>');    // plain text → HTML
}

function richEditorSection(f) {
  const html = toEditorHtml(draftTemplate[f.key] || '');
  return `<div class="tmpl-section">
    <div class="tmpl-label">${f.label}</div>
    <div class="tmpl-hint">${f.hint}</div>
    <div class="tmpl-editor-wrap">
      <div class="tmpl-fmt-toolbar" id="toolbar-${f.key}">
        <button class="tmpl-fmt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
        <button class="tmpl-fmt-btn" data-cmd="italic" title="Italic"><i>I</i></button>
        <button class="tmpl-fmt-btn" data-cmd="underline" title="Underline"><u>U</u></button>
        <div class="tmpl-fmt-sep"></div>
        <button class="tmpl-fmt-btn" data-cmd="removeFormat" title="Clear formatting" style="font-size:10px;">Tx</button>
      </div>
      <div class="tmpl-editor" id="editor-${f.key}"
           contenteditable="true"
           style="min-height:${f.minHeight || '80px'}"
           oninput="onEditorInput('${f.key}')">${html}</div>
    </div>
  </div>`;
}

function initEditorToolbar(key) {
  const toolbar = document.getElementById('toolbar-' + key);
  const editor  = document.getElementById('editor-'  + key);
  if (!toolbar || !editor) return;

  toolbar.querySelectorAll('.tmpl-fmt-btn').forEach(btn => {
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      editor.focus();
      document.execCommand(btn.dataset.cmd, false, null);
      updateToolbarState(key);
      onEditorInput(key);
    });
  });

  editor.addEventListener('keyup',    () => updateToolbarState(key));
  editor.addEventListener('mouseup',  () => updateToolbarState(key));
  editor.addEventListener('focus',    () => updateToolbarState(key));
}

function updateToolbarState(key) {
  const toolbar = document.getElementById('toolbar-' + key);
  if (!toolbar) return;
  ['bold','italic','underline'].forEach(cmd => {
    const btn = toolbar.querySelector(`[data-cmd="${cmd}"]`);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

function onEditorInput(key) {
  draftTemplate[key] = document.getElementById('editor-' + key).innerHTML;
  markDirty();
}

function markDirty() {
  document.getElementById('settings-dirty').style.display = 'inline';
  document.getElementById('settings-saved').style.display = 'none';
}
function markClean() {
  document.getElementById('settings-dirty').style.display = 'none';
  document.getElementById('settings-saved').style.display = 'none';
}
function showSavedFlash() {
  document.getElementById('settings-dirty').style.display = 'none';
  const s = document.getElementById('settings-saved');
  s.style.display = 'inline';
  setTimeout(() => { s.style.display = 'none'; }, 2500);
}

function saveSettings() {
  template   = { ...draftTemplate };
  excelDesc  = draftExcelDesc;
  // Save colmaps from inputs
  sheets.forEach(s => {
    const cm = {};
    ['name','poc','sector','email','linkedin'].forEach(field => {
      const el = document.getElementById(`colmap-${s.id}-${field}`);
      if (el) cm[field] = parseInt(el.value, 10) || 0;

// ============================================================
//  Attachments
// ============================================================
function handleAttachUpload(e) {
  const files = Array.from(e.target.files);
  e.target.value = '';
  let pending = files.length;
  if (!pending) return;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const bytes = new Uint8Array(ev.target.result);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      const b64 = btoa(binary);
      attachments.push({ name: file.name, b64, mime: file.type || 'application/octet-stream', size: file.size });
      if (--pending === 0) {
        saveAttachments();
        // Re-render just the attach list
        const list = document.getElementById('attach-list');
        if (list) {
          list.innerHTML = attachments.map((a, i) =>
            `<div class="attach-item">
               <span class="attach-item-name" title="${esc(a.name)}">${esc(a.name)}</span>
               <span class="attach-item-size">${formatBytes(a.size)}</span>
               <button class="btn" style="color:var(--danger);border-color:var(--danger);padding:3px 8px;font-size:11px;" onclick="removeAttachment(${i})">Remove</button>
             </div>`).join('');
        }
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function removeAttachment(i) {
  attachments.splice(i, 1);
  saveAttachments();
  // Re-render attach list in place
  const list = document.getElementById('attach-list');
  if (list) {
    if (attachments.length) {
      list.innerHTML = attachments.map((a, idx) =>
        `<div class="attach-item">
           <span class="attach-item-name" title="${esc(a.name)}">${esc(a.name)}</span>
           <span class="attach-item-size">${formatBytes(a.size)}</span>
           <button class="btn" style="color:var(--danger);border-color:var(--danger);padding:3px 8px;font-size:11px;" onclick="removeAttachment(${idx})">Remove</button>
         </div>`).join('');
    } else {
      list.innerHTML = `<div style="font-size:12px;color:var(--text3);">No attachments — emails will be sent without files.</div>`;
    }
  }
}

function formatBytes(b) {
  if (b < 1024)       return b + ' B';
  if (b < 1048576)    return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function sub(str, c, fn) {

    .replace(/\{\{COMPANY\}\}/g,    c.name)

// Strip HTML tags to plain text for Gemini prompt; convert <br>/<p> to newlines
function htmlToText(html) {
  return html
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/p>/gi, '\n')
    .replace(/<[^>]+>/g, '')
    .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&nbsp;/g, ' ')
    .trim();
}

// Sub placeholders in an HTML string (don't escape the replacement)
function subHtml(html, c, fn) {
  return html
    .replace(/\{\{COMPANY\}\}/g,    esc(c.name))
    .replace(/\{\{FIRST_NAME\}\}/g, esc(fn));
}

function buildPrompt(c) {
  const fn   = c.poc.trim().split(' ')[0];
  const li   = c.linkedin || 'use your general knowledge of the company';
  const body = sub(htmlToText(template.body || ''), c, fn);

  return `You are a professional email writer. Fill in the [TAILORED PARAGRAPH] in the email template below. Output only the completed email — no preamble, no commentary, no thinking steps.

The [TAILORED PARAGRAPH] should be 2-3 sentences specific to ${c.name} (${c.sector}). POC: ${fn}. LinkedIn: ${li}.

RULES FOR THE TAILORED PARAGRAPH:
${htmlToText(template.rules || '')}

EMAIL TEMPLATE (reproduce exactly, replacing only [TAILORED PARAGRAPH]):
${body}

OUTPUT FORMAT — start immediately with SUBJECT: on line 1:

SUBJECT: Application for Product Management Intern at ${c.name} | IIT Kharagpur

BODY:
${body.split('\n').slice(0, 1).join('')}

[full email with tailored paragraph filled in]`;
}

// ============================================================
//  Gemini call
// ============================================================
async function callGemini(c) {
  const resp = await fetch((await geminiUrl()) + encodeURIComponent(apiKey()), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: 'You are a precise email writer. Output only what is asked. Never include reasoning, thinking steps, or commentary. Start your response immediately with SUBJECT: on the first line.' }] },
      contents: [{ role: 'user', parts: [{ text: buildPrompt(c) }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
    })
  });

  const data = await resp.json();
  if (!resp.ok) throw new Error(data?.error?.message || `HTTP ${resp.status}`);

  const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!raw) throw new Error('Empty response from Gemini.');

  const subjectMatch = raw.match(/^SUBJECT:\s*(.+)$/m);
  let bodyMatch      = raw.match(/^BODY:\s*\n([\s\S]+)/m);

  if (subjectMatch && !bodyMatch) {
    const afterSubject = raw.slice(raw.indexOf(subjectMatch[0]) + subjectMatch[0].length).trim();
    if (afterSubject) bodyMatch = [null, afterSubject];
  }

  if (!subjectMatch || !bodyMatch)
    throw new Error(`Could not find SUBJECT/BODY markers in response:\n${raw.slice(0, 400)}`);

  const plainBody = bodyMatch[1].trim();

  // Try to extract just the tailored paragraph so we can inject template HTML formatting
  const tailored = extractTailoredParagraph(c, plainBody);

  return { subject: subjectMatch[1].trim(), body: plainBody, tailored };
}

// Extract just the tailored paragraph from Gemini's output
// by finding what replaced [TAILORED PARAGRAPH] in the template
function extractTailoredParagraph(c, plainBody) {
  const fn       = c.poc.trim().split(' ')[0];
  const tmplText = sub(htmlToText(template.body || ''), c, fn);
  const parts    = tmplText.split('[TAILORED PARAGRAPH]');
  if (parts.length < 2) return null;

  const before = parts[0].trim().slice(-60);  // last 60 chars before placeholder
  const after  = parts[1].trim().slice(0, 60); // first 60 chars after placeholder

  const beforeIdx = before ? plainBody.lastIndexOf(before.slice(0, 40)) : -1;
  if (beforeIdx === -1) return null;
  const startIdx = beforeIdx + before.length;

  const afterIdx = after ? plainBody.indexOf(after.slice(0, 40), startIdx) : plainBody.length;
  if (afterIdx === -1) return null;

  return plainBody.slice(startIdx, afterIdx).trim();
}

// Build HTML body — inject tailored paragraph into template HTML
function buildHtmlBody(c, tailored) {
  const fn       = c.poc.trim().split(' ')[0];
  const bodyHtml = subHtml(toEditorHtml(template.body || ''), c, fn);
  const tailHtml = tailored ? esc(tailored).replace(/\n/g, '<br>') : '';
  return bodyHtml.replace(/\[TAILORED PARAGRAPH\]/g, tailHtml);
}

async function generateOne(id) {
  const sid = String(id);
  const c = companies.find(x => String(x.id) === sid);
  if (!c) return;
  setState(sid, { status: 'loading', subject: '', body: '', error: '', sent: false });
  try {
    if (template.useGemini === false) {
      // Plain substitution — no Gemini call
      const fn      = c.poc.trim().split(' ')[0];
      const htmlBody = subHtml(toEditorHtml(template.body || ''), c, fn)
        .replace(/\[TAILORED PARAGRAPH\]/g, '');
      const subject  = sub(template.subject || `Internship Application — {{COMPANY}}`, c, fn);
      setState(sid, { status: 'done', subject, body: htmlBody, error: '', sent: false });
    } else {
      const result  = await callGemini(c);
      const htmlBody = result.tailored
        ? buildHtmlBody(c, result.tailored)
        : result.body;
      setState(sid, { status: 'done', subject: result.subject, body: htmlBody, error: '', sent: false });
    }
  } catch (err) {
    setState(sid, { status: 'error', subject: '', body: '', error: String(err), sent: false });
  }
  refreshProgress();
}

  generatingAll = true; stopRequested = false;
  document.getElementById('genAllBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'inline-block';
  refreshProgress();
  const queue = companies.filter(c => emailState[String(c.id)]?.status !== 'done');
  for (let i = 0; i < queue.length; i++) {

function waitForGIS(cb) {
  if (window.google?.accounts?.oauth2) { cb(); return; }
  let tries = 0;
  const t = setInterval(() => {
    if (window.google?.accounts?.oauth2) { clearInterval(t); cb(); return; }
    if (++tries > 100) { clearInterval(t); flash('Gmail library failed to load.'); }
  }, 100);
}

function initGmailClient(clientId) {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: [
      'https://www.googleapis.com/auth/gmail.send',
      'https://www.googleapis.com/auth/gmail.compose',
      'https://www.googleapis.com/auth/gmail.readonly',
      'https://www.googleapis.com/auth/gmail.modify',
    ].join(' '),
    callback: onGmailToken
  });
}

function onGmailToken(resp) {
  if (resp.error) {
    gmailToken = null; showGmailStatus(false);
    flash('Gmail auth failed: ' + resp.error); pendingGmail = null; return;
  }
  gmailToken = resp.access_token;
  showGmailStatus(true);
  if (pendingGmail) {
    const { id, action } = pendingGmail; pendingGmail = null;
    action === 'send' ? executeDirectSend(id) : executeCreateDraft(id);
  }
}

  waitForGIS(() => { initGmailClient(cid); tokenClient.requestAccessToken({ prompt: 'consent' }); });

  if (!cid) { flash('Paste your Gmail Client ID in the top bar and click Connect.'); return; }
  if (!tokenClient) waitForGIS(() => initGmailClient(cid));

  action === 'send' ? executeDirectSend(String(id)) : executeCreateDraft(String(id));

// ============================================================
//  Email construction
// ============================================================
function buildRawEmail(to, subject, htmlBody) {
  if (!attachments.length) {
    return ['To: '+to,'Subject: '+subject,'MIME-Version: 1.0',
            'Content-Type: text/html; charset=utf-8','',htmlBody].join('\r\n');
  }
  const boundary = 'bound_' + Date.now();
  const parts = [
    'To: '+to, 'Subject: '+subject, 'MIME-Version: 1.0',
    `Content-Type: multipart/mixed; boundary="${boundary}"`, '',
    '--'+boundary, 'Content-Type: text/html; charset=utf-8', '', htmlBody,
  ];
  attachments.forEach(a => {
    parts.push(
      '--'+boundary,
      `Content-Type: ${a.mime}; name="${a.name}"`,
      `Content-Disposition: attachment; filename="${a.name}"`,
      'Content-Transfer-Encoding: base64', '',
      a.b64
    );
  });
  parts.push('--'+boundary+'--');
  return parts.join('\r\n');
}

function toBase64Url(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function executeDirectSend(id) {
  const sid = String(id);
  const c = companies.find(x => String(x.id) === sid);
  const st = emailState[sid];
  if (!c || !st) return;
  flash('Sending...');
  try {
    const raw  = buildRawEmail(c.email, st.subject, getHtmlBody(id));
    const resp = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + gmailToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw: toBase64Url(raw) })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      if (resp.status === 401) { gmailToken = null; showGmailStatus(false); }
      throw new Error(err?.error?.message || 'HTTP ' + resp.status);
    }
    emailState[sid] = { ...st, sent: true, locked: true, sentAt: new Date().toISOString() };
    saveState();
    // Write to log
    DB.get('logs', ns('log')).then(raw => {
      const log = raw ? JSON.parse(raw) : [];
      log.unshift({ pocName: c.poc, company: c.name, email: c.email, sentAt: new Date().toISOString() });
      DB.put('logs', ns('log'), JSON.stringify(log)).catch(console.error);
    });
    if (String(selectedId) === sid) renderPanel();
    flash('&#10003; Sent to ' + esc(c.poc) + '!');
  } catch (err) { flash('Send failed: ' + err.message); }
}

async function executeCreateDraft(id) {
  const sid = String(id);
  const c = companies.find(x => String(x.id) === sid);
  const st = emailState[sid];
  if (!c || !st) return;
  flash('Creating draft...');
  try {
    const raw  = buildRawEmail(c.email, st.subject, getHtmlBody(id));
    const resp = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/drafts', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + gmailToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: { raw: toBase64Url(raw) } })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      if (resp.status === 401) { gmailToken = null; showGmailStatus(false); }
      throw new Error(err?.error?.message || 'HTTP ' + resp.status);
    }
    flash('Draft created — opening Gmail...');
    setTimeout(() => window.open('https://mail.google.com/mail/#drafts', '_blank'), 600);
  } catch (err) { flash('Draft failed: ' + err.message); }
}

//  Excel upload
// ============================================================
async function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  const info = document.getElementById('upload-info');
  try {
    const sheetId = 'sheet_' + Date.now().toString(36);
    const cm = sheetColmaps[sheetId] || { ...DEFAULT_COLMAP };
    // Store raw Excel bytes for re-parsing on colmap change
    const rawB64 = await fileToBase64(file);
    await DB.put('settings', ns('sheetraw_' + sheetId), rawB64);
    // Prefix company IDs with sheetId to avoid collision
    const rawParsed = await parseExcelData(rawB64, cm);
    const parsed = rawParsed.map(c => ({ ...c, id: sheetId + '_' + c.id }));
    if (!parsed.length) {
      info.textContent = 'No valid rows found. Check column mapping in Settings.';
      info.className = 'err'; return;
    }
    sheetColmaps[sheetId] = cm;
    sheets.push({ id: sheetId, name: file.name, companies: parsed });
    activeSheetIds = sheets.map(s => s.id);
    recomputeActiveCompanies();
    // Init emailState for new companies
    parsed.forEach(c => {
      if (!emailState[c.id])
        emailState[c.id] = { status: 'pending', subject: '', body: '', error: '', sent: false };
    });
    saveSheets(); saveState(); saveSheetColmaps();
    info.textContent = `${sheets.length} sheet${sheets.length>1?'s':''} — ${companies.length} companies`;
    info.className = '';
    renderSheetSelector();
    selectedId = companies[0]?.id || null;
    renderSidebar(); if (selectedId) renderPanel(); refreshProgress();
  } catch (err) { info.textContent = `Error: ${err.message}`; info.className = 'err'; }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Failed to read file.'));
    reader.onload = e => {
      const bytes = new Uint8Array(e.target.result);
      let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
      resolve(btoa(bin));
    };
    reader.readAsArrayBuffer(file);
  });
}

function parseExcelData(b64, cm) {
  cm = cm || DEFAULT_COLMAP;
  return new Promise((resolve, reject) => {
    try {
      const bin      = atob(b64);
      const data     = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) data[i] = bin.charCodeAt(i);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet    = workbook.Sheets[workbook.SheetNames[0]];
      const rows     = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      const INVALID  = ['n.a.', 'n/a', '-', 'na', ''];
      const result   = [];
      for (let i = 1; i < rows.length; i++) {
        const row     = rows[i];
        const name    = String(row[cm.name]     || '').trim();
        const poc     = String(row[cm.poc]      || '').trim();
        const sector  = String(row[cm.sector]   || '').trim();
        const email   = String(row[cm.email]    || '').trim();
        const linkedin= String(row[cm.linkedin] || '').trim();
        if (!name) continue;
        if (INVALID.includes(email.toLowerCase())) continue;
        result.push({ id: i, name, poc, sector, email, linkedin: linkedin.startsWith('http') ? linkedin : '' });
      }
      resolve(result);
    } catch (err) { reject(err); }
  });
}

async function parseExcel(file, cm) {
  const b64 = await fileToBase64(file);
  return parseExcelData(b64, cm || DEFAULT_COLMAP);
}

async function generateFollowup(companyId) {
  const sel  = document.getElementById('fu-select-' + companyId);
  const idx  = sel ? Number(sel.value) : 0;
  const tmpl = followupTemplates[idx];
  if (!tmpl) return;

  const c  = companies.find(x => String(x.id) === String(companyId));
  if (!c) return;
  const fn = c.poc.trim().split(' ')[0];

  const panel = document.getElementById('fu-panel-' + companyId);
  if (panel) panel.innerHTML = `<div class="loading-msg">Generating follow-up...</div>`;

  let body = tmpl.body || '';

  if (tmpl.useGemini) {
    if (!apiKey()) { flash('Enter Gemini API key first.'); return; }
    try {
      const prompt = `Write a follow-up email based on this template. Fill in any placeholders and tailor it.
Company: ${c.name} (${c.sector}). POC first name: ${fn}.
Template: ${body.replace(/\{\{COMPANY\}\}/g, c.name).replace(/\{\{FIRST_NAME\}\}/g, fn)}
Rules: ${tmpl.rules || 'Keep it brief and professional.'}
Output only SUBJECT: and BODY: like a standard email. No commentary.`;
      const resp = await fetch((await geminiUrl()) + encodeURIComponent(apiKey()), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: 'Output only SUBJECT: and BODY:. No preamble.' }] },
          contents: [{ role: 'user', parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
        })
      });
      const data = await resp.json();
      const raw  = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const sm   = raw.match(/^SUBJECT:\s*(.+)$/m);
      const bm   = raw.match(/^BODY:\s*\n([\s\S]+)/m);
      if (sm) body = `${sm[1].trim()}\n\n${bm ? bm[1].trim() : raw}`;
      else    body = raw;
    } catch (err) {
      if (panel) panel.innerHTML = `<div class="err-box">${esc(String(err))}</div>`;
      return;
    }
  } else {
    body = body.replace(/\{\{COMPANY\}\}/g, c.name).replace(/\{\{FIRST_NAME\}\}/g, fn);
  }

  if (panel) {
    const fuId = 'fu_' + companyId + '_' + Date.now();
    panel.innerHTML =
      `<div class="p-subject-label">Follow-up body</div>
       <div class="p-body-editor" contenteditable="true" id="${fuId}">${bodyToHtml(body)}</div>
       <div class="send-row" style="margin-top:8px;">
         <button class="btn btn-primary" onclick="sendFollowup('${companyId}','${fuId}')">Send follow-up</button>
         <button class="btn" onclick="draftFollowup('${companyId}','${fuId}')">Save as draft</button>
       </div>`;
  }
}

function sendFollowup(companyId, editorId) {
  const c = companies.find(x => String(x.id) === String(companyId));
  if (!c) return;
  const el = document.getElementById(editorId);
  const body = el ? el.innerHTML : '';
  const st   = emailState[companyId] || {};
  const subject = 'Re: ' + (st.subject || '');
  // Re-use existing send flow with temporary subject override
  const tmpState = { ...st, subject, body };
  emailState[companyId] = tmpState;
  triggerGmail(companyId, 'send');
}

function draftFollowup(companyId, editorId) {
  const c = companies.find(x => String(x.id) === String(companyId));

  const el = document.getElementById(editorId);

  const st   = emailState[companyId] || {};

  emailState[companyId] = tmpState;
  triggerGmail(companyId, 'draft');
}

let activeTheme = 'midnight';

function applyTheme(themeId) {
  const theme = BUILT_IN_THEMES[themeId] || BUILT_IN_THEMES.midnight;
  const root  = document.documentElement;
  Object.entries(theme.colors).forEach(([k, v]) => root.style.setProperty(k, v));
  // Special overrides (Terminal, Hacker)
  if (theme.special) {
    if (theme.special.fontFamily) document.body.style.fontFamily = theme.special.fontFamily;
    if (theme.special.borderRadius !== undefined) {
      root.style.setProperty('--br', theme.special.borderRadius);
      document.querySelectorAll('.btn,.proj-card,.company-btn,#login-card,#tutorial-card,#new-proj-modal-card').forEach(el => {
        el.style.borderRadius = theme.special.borderRadius;
      });
    }
  } else {
    document.body.style.fontFamily = '';
    root.style.setProperty('--br', '');
  }
  activeTheme = themeId;
}

function updateThemeLabel() {
  const el = document.getElementById('theme-bar-link');
  if (!el) return;
  const theme = BUILT_IN_THEMES[activeTheme] || BUILT_IN_THEMES.midnight;
  el.textContent = `Theme: ${theme.name}`;
}

function toggleThemePicker() {
  const ov = document.getElementById('theme-picker-overlay');
  if (ov.style.display === 'flex') { ov.style.display = 'none'; return; }
  renderThemePicker();
  ov.style.display = 'flex';
}

function renderThemePicker() {
  const container = document.getElementById('theme-swatches-container');
  const all = { ...BUILT_IN_THEMES };
  container.innerHTML = Object.entries(all).map(([id, t]) => {
    const bg  = t.colors['--bg'];
    const acc = t.colors['--accent'];
    const txt = t.colors['--text'];
    return `<div class="theme-swatch${id === activeTheme ? ' active' : ''}" onclick="selectTheme('${id}')">
      <div class="swatch-rect" style="background:${bg}">
        <div class="swatch-dot" style="background:${acc}"></div>
        <div class="swatch-dot" style="background:${txt};opacity:0.6"></div>
      </div>
      <div class="swatch-name">${t.name}</div>
    </div>`;
  }).join('');
}

function selectTheme(themeId) {
  applyTheme(themeId);
  updateThemeLabel();
  DB.put('settings', ns('theme'), themeId).catch(console.error);
  // Update active state in picker
  document.querySelectorAll('.theme-swatch').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === `selectTheme('${themeId}')`);
  });
}

    e.preventDefault();

    ${ctxField('ctx-clinkedin','LinkedIn',c.linkedin)}
    ${ctxField('ctx-cthreadid','Gmail thread ID',threadId)}
    <button class="btn btn-primary" style="margin-top:4px;" onclick="saveContextEdit()">Save</button>`;
  document.body.appendChild(menu);
}

function ctxField(id, label, val) {
  return `<label style="display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--text2);">${label}
    <input id="${id}" class="np-input" style="font-size:12px;padding:5px 8px;" value="${esc(val)}"></label>`;
}

function saveContextEdit() {
  const numId = Number(ctxMenuCompanyId);
  const c = companies.find(x => x.id === numId || x.id === ctxMenuCompanyId);
  if (!c) return;
  c.name     = document.getElementById('ctx-cname')?.value.trim()    || c.name;
  c.poc      = document.getElementById('ctx-cpoc')?.value.trim()     || c.poc;
  c.email    = document.getElementById('ctx-cemail')?.value.trim()   || c.email;
  c.sector   = document.getElementById('ctx-csector')?.value.trim()  || c.sector;
  c.linkedin = document.getElementById('ctx-clinkedin')?.value.trim()|| c.linkedin;
  const sid  = String(c.id);
  const threadId = document.getElementById('ctx-cthreadid')?.value.trim() || '';
  if (threadId || emailState[sid]?.gmailThreadId) {
    emailState[sid] = { ...(emailState[sid] || { status:'pending', subject:'', body:'', error:'', sent:false }), gmailThreadId: threadId };
    saveState();
  }
  saveCompanies();
  renderSidebarWithSearch();
  if (String(selectedId) === sid) renderPanel();
  hideContextMenu();
}

function hideContextMenu() {
  const m = document.getElementById('ctx-menu');
  if (m) m.remove();
}

// ============================================================
//  Send All
// ============================================================
async function sendAll() {
  if (!gmailToken) { flash('Connect Gmail first.'); return; }
  const pending = companies.filter(c => emailState[String(c.id)]?.status === 'done' && !emailState[String(c.id)]?.sent);
  if (!pending.length) { flash('No generated (unsent) emails ready.'); return; }
  if (!confirm(`Send ${pending.length} emails via Gmail? A 2-second delay between each.`)) return;

  stopRequested = false;
  document.getElementById('genAllBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'inline-block';

  for (let i = 0; i < pending.length; i++) {
    if (stopRequested) break;
    document.getElementById('progress-label').textContent = `Sending ${i+1} / ${pending.length}...`;
    await executeDirectSend(pending[i].id);
    if (i < pending.length - 1) await sleep(2000);
  }

  document.getElementById('genAllBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
  refreshProgress();
}

// ============================================================
//  Keyboard shortcuts
// ============================================================
function initKeyboardShortcuts() {
  document.addEventListener('keydown', e => {
    const inInput = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName) || document.activeElement.isContentEditable;
    if (e.key === 'Escape') {
      document.getElementById('theme-picker-overlay').style.display = 'none';
      hideContextMenu();
      return;
    }
    if (e.key === '/' && !inInput) { e.preventDefault(); document.getElementById('sidebar-search-input')?.focus(); return; }
    if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && !inInput && selectedId) {
      e.preventDefault();
      const idx  = companies.findIndex(c => c.id === selectedId);
      const next = companies[Math.max(0, Math.min(companies.length-1, idx + (e.key==='ArrowDown'?1:-1)))];
      if (next) selectCompany(next.id);
      return;
    }
    if (e.ctrlKey && e.key === 'Enter')                      { e.preventDefault(); if (selectedId) triggerGmail(selectedId,'send'); }
    if (e.ctrlKey && e.shiftKey && e.key.toUpperCase()==='D'){ e.preventDefault(); if (selectedId) triggerGmail(selectedId,'draft'); }
    if (e.ctrlKey && e.key.toLowerCase()==='g' && !inInput)  { e.preventDefault(); if (selectedId) triggerGenerate(selectedId); }
  });
}

// ============================================================
//  Utility
// ============================================================
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
